<h1>Issue Book</h1>

<form method="POST">
{% csrf_token %}

Student:
<select name="student">
{% for student in students %}
<option value="{{student.id}}">{{student.name}}</option>
{% endfor %}
</select>

<br><br>

Book:
<select name="book">
{% for book in books %}
<option value="{{book.id}}">{{book.title}}</option>
{% endfor %}
</select>

<br><br>

<button type="submit">Issue Book</button>

</form>

<br>
<a href="/">Home</a>
